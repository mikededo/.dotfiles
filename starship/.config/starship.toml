"$schema" = 'https://starship.rs/config-schema.json'

# Prompt
format = """$directory$character"""
palette = "catppuccin_mocha"
right_format = """
$rust\
$lua\
$nodejs\
$cmd_duration\
$memory_usage\
$time\
"""
command_timeout = 1500
add_newline = false

[character]
success_symbol = '[➜](bold peach)'
error_symbol = '[➜](bold red)'

[directory]
style = "blue"
truncation_length = 2
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = ""
"Downloads" = ""
"/mnt/media" = " "

[cmd_duration]
min_time = 0                                # always show
format = "[$duration]($style)[·](overlay1)"
style = "subtext1"
disabled = false

[memory_usage]
disabled = false
format = "[$symbol$ram_pct]($style) "
style = "peach"
symbol = "⛁ "
threshold = 75

[time]
disabled = false
format = "[$time]($style)"
time_format = "%R"
style = "subtext0"

[package]
format = "[$symbol$version]($style) "
style = "208"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = "bold mauve"
symbol = "\uF126 "

[nodejs]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold green"
not_capable_style = "bold red"

[rust]
disabled = false
format = "[$symbol($version)]($style)"
style = "bold peach"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
